server {
    listen 80;
    server_name localhost;

    # Serve lesson2 at /lesson2
    location /lesson2/ {
        alias /usr/share/nginx/html/lesson2/;
        index index.html;
        try_files $uri $uri/ =404;
    }

    # Serve lesson3 at /lesson3 (example for future lessons)
    location /lesson3/ {
        alias /usr/share/nginx/html/lesson3/;
        index index.html;
        try_files $uri $uri/ =404;
    }

    # Serve lesson4 at /lesson4 (example for future lessons)
    location /lesson4/ {
        alias /usr/share/nginx/html/lesson4/;
        index index.html;
        try_files $uri $uri/ =404;
    }

    # Serve lesson5 at /lesson5 (example for future lessons)
    location /lesson5/ {
        alias /usr/share/nginx/html/lesson5/;
        index index.html;
        try_files $uri $uri/ =404;
    }

    # Root location - redirect to lesson2 by default or show available lessons
    location / {
        root /usr/share/nginx/html;
        index index.html;
        
        # List available lessons directory
        autoindex on;
        autoindex_exact_size off;
    }

    # Disable logging for health checks
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}