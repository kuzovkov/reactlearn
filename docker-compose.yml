version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: reactlearn-nginx
    ports:
      - "8031:80"
    volumes:
      - ./lesson2:/usr/share/nginx/html/lesson2:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3